services:
  zenoh:
    image: eclipse/zenoh:1.4.0
    ports: [ "7447:7447" ]

  etcd:
    image: quay.io/coreos/etcd:v3.5.12
    network_mode: host
    command:
      - /usr/local/bin/etcd
      - --name
      - s1
      - --listen-client-urls
      - http://0.0.0.0:2379
      - --advertise-client-urls
      - http://0.0.0.0:2379

  building-service:
    image: alexzangerle/buildingservice-csm-s1
    pull_policy: always
    ports: [ "8005:8005" ]
    volumes:
      - ./metricsGas2:/metrics

  gas:
    image: collaborativestatemachines/cirrina:unstable
    pull_policy: always
    network_mode: host
    environment:
      - MAIN_URI=file:///app/smartBuilding/main.pkl
      - ETCD_CONTEXT_URL=http://localhost:2379
      - RUN=gasSafety
    volumes:
      - ../smartBuilding:/app/smartBuilding
      - ./metricsGas3/:/metrics
    depends_on: [ zenoh, etcd, building-service ]

  hvac:
    image: collaborativestatemachines/cirrina:unstable
    pull_policy: always
    network_mode: host
    environment:
      - MAIN_URI=file:///app/smartBuilding/main.pkl
      - ETCD_CONTEXT_URL=http://localhost:2379
      - RUN=hvac
    volumes:
      - ../smartBuilding:/app/smartBuilding
      - ./metricsGas2/:/metrics
    depends_on: [ zenoh, etcd, building-service ]

  simulation:
    image: alexzangerle/simulation-csm-s1
    pull_policy: always
    volumes:
      - ./metricsGas2:/metrics
    depends_on: [ hvac, gas ]
    command: [ "--duration=900000", "--settle=100", "--metrics=/metrics", "--circuit=gas" ]
