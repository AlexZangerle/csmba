services:
  zenoh:
    image: eclipse/zenoh:1.4.0
    network_mode: host
  etcd:
    image: quay.io/coreos/etcd:v3.5.12
    network_mode: host
    command:
      - /usr/local/bin/etcd
      - --name
      - s6
      - --listen-client-urls
      - http://0.0.0.0:2379
      - --advertise-client-urls
      - http://0.0.0.0:2379
  building-service:
    build: building-service
    network_mode: host
    volumes:
      - ./metrics/building-service:/metrics
  # --- State Machines (one runtime each) ---
  buildingSchedule:
    image: collaborativestatemachines/cirrina:unstable
    pull_policy: always
    network_mode: host
    environment:
      - MAIN_URI=file:///app/smartBuilding/main.pkl
      - ETCD_CONTEXT_URL=http://localhost:2379
      - RUN=buildingSchedule
    volumes:
      - ../smartBuilding:/app/smartBuilding
      - ./metrics/buildingSchedule:/metrics
    depends_on: [zenoh, etcd, building-service]
  roomSchedule:
    image: collaborativestatemachines/cirrina:unstable
    pull_policy: always
    network_mode: host
    environment:
      - MAIN_URI=file:///app/smartBuilding/main.pkl
